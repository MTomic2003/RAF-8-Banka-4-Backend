name: Banka 4 CI - Unit Tests
run-name: Unit tests for ${{ github.repository }}

on:
  workflow_dispatch:
  push:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out ${{ github.ref }} after a ${{ github.event_name }} event
      uses: actions/checkout@v5

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26'
    
    - name: Run unit tests
      run: |
        echo "Running unit tests for common packages..."
        go test -v ./common/...
        for service in $(ls -d ./services/*/); do
          echo "Running unit tests for $service..."
          go test -v $service...
        done